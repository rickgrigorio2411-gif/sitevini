<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Truck Store{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #1a1a2e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: #fff; text-decoration: none; margin: 0 0.8rem; font-weight: bold; }
        nav a:hover { color: #e94560; }
        .nav-brand { font-size: 1.4rem; color: #e94560 !important; }
        .cart-badge { background: #e94560; color: #fff; border-radius: 50%; padding: 2px 7px; font-size: 0.75rem; margin-left: 2px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
        .messages { padding: 0.5rem 2rem; }
        .alert { padding: 0.8rem 1rem; margin-bottom: 0.5rem; border-radius: 4px; }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-warning { background: #fff3cd; color: #856404; }
        .alert-info { background: #d1ecf1; color: #0c5460; }
        footer { background: #1a1a2e; color: #aaa; text-align: center; padding: 1.5rem; margin-top: 3rem; }
        .btn { display: inline-block; padding: 0.6rem 1.2rem; border-radius: 4px; text-decoration: none; cursor: pointer; border: none; font-size: 1rem; }
        .btn-primary { background: #e94560; color: #fff; }
        .btn-primary:hover { background: #c73652; }
        .btn-secondary { background: #555; color: #fff; }
        .btn-secondary:hover { background: #333; }
        .btn-danger { background: #dc3545; color: #fff; }
        .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.85rem; }
    </style>
</head>
<body>
<nav>
    <a href="{% url 'core:home' %}" class="nav-brand">🚛 Truck Store</a>
    <div>
        <a href="{% url 'core:home' %}">Início</a>
        <a href="{% url 'catalogo:lista' %}">Catálogo</a>
        <a href="{% url 'core:sobre' %}">Sobre</a>
        <a href="{% url 'core:contato' %}">Contato</a>
        <a href="{% url 'carrinho:ver' %}">🛒 Carrinho
            {% if carrinho_quantidade > 0 %}<span class="cart-badge">{{ carrinho_quantidade }}</span>{% endif %}
        </a>
        <a href="/admin/">Admin</a>
    </div>
</nav>

{% if messages %}
<div class="messages">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
</div>
{% endif %}

{% block content %}{% endblock %}

<footer>
    <p>&copy; 2024 Truck Store — Máquinas e Equipamentos</p>
</footer>
</body>
</html>
